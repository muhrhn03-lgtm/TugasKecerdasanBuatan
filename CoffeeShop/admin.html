<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Warung Ne'Cil</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { background: var(--bg); min-height: 100vh; }

    /* TOPBAR */
    .admin-topbar {
      background: var(--primary); color: white;
      padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .admin-topbar-brand { display: flex; align-items: center; gap: 12px; }
    .admin-topbar-brand img { height: 40px; }
    .admin-topbar-brand span { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
    .admin-topbar-right { display: flex; align-items: center; gap: 16px; }
    .admin-user-info { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; opacity: 0.9; }
    .topbar-logout {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 8px 16px; border-radius: 50px; cursor: pointer;
      font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px; transition: var(--transition);
    }
    .topbar-logout:hover { background: rgba(255,255,255,0.35); }

    /* LAYOUT */
    .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 68px); }

    /* SIDEBAR */
    .admin-sidebar {
      background: var(--dark); color: white; padding: 24px 0;
      position: sticky; top: 68px; height: calc(100vh - 68px); overflow-y: auto;
    }
    .sidebar-section { padding: 0 16px; margin-bottom: 8px; }
    .sidebar-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); padding: 8px 12px 4px; }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer;
      font-size: 0.9rem; color: rgba(255,255,255,0.75); transition: var(--transition);
      border: none; background: none; width: 100%; text-align: left; font-family: 'Poppins', sans-serif;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .sidebar-item.active { background: var(--primary); color: white; }
    .sidebar-item i { width: 18px; text-align: center; }

    /* MAIN CONTENT */
    .admin-main { padding: 32px; overflow-y: auto; }

    /* STATS CARDS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: white; border-radius: var(--radius); padding: 24px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
    }
    .stat-icon {
      width: 52px; height: 52px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    .stat-icon.brown { background: #fff5ec; color: var(--primary); }
    .stat-icon.green { background: #e8f5e9; color: #2e7d32; }
    .stat-icon.blue { background: #e3f2fd; color: #1565c0; }
    .stat-icon.orange { background: #fff3e0; color: #e65100; }
    .stat-info span { font-size: 0.8rem; color: var(--text-light); display: block; margin-bottom: 4px; }
    .stat-info strong { font-size: 1.6rem; font-family: 'Playfair Display', serif; color: var(--dark); }

    /* PANEL SECTIONS */
    .panel-section { display: none; }
    .panel-section.active { display: block; }

    /* CARD */
    .content-card {
      background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .content-card-header {
      padding: 20px 24px; border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
    }
    .content-card-header h3 { font-size: 1.1rem; color: var(--dark); display: flex; align-items: center; gap: 10px; }
    .content-card-body { padding: 24px; }

    /* FORM GRID */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid .full { grid-column: 1 / -1; }
    .field { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 14px; border: 2px solid #eee; border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif; font-size: 0.9rem; color: var(--dark);
      background: var(--bg); transition: var(--transition);
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary); background: white; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* MENU TABLE */
    .menu-toolbar {
      padding: 16px 24px; border-bottom: 1px solid #eee;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .menu-cat-tabs { display: flex; gap: 8px; }
    .cat-tab {
      padding: 8px 18px; border-radius: 50px; border: 2px solid #eee;
      background: transparent; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      font-family: 'Poppins', sans-serif; color: var(--text-light); transition: var(--transition);
    }
    .cat-tab.active, .cat-tab:hover { background: var(--primary); border-color: var(--primary); color: white; }
    .search-input-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
    .search-input-wrap input {
      width: 100%; padding: 10px 14px 10px 36px; border: 2px solid #eee; border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif; font-size: 0.88rem; background: var(--bg);
    }
    .search-input-wrap input:focus { outline: none; border-color: var(--primary); background: white; }
    .filter-select {
      padding: 10px 14px; border: 2px solid #eee; border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif; font-size: 0.88rem; background: var(--bg); cursor: pointer;
    }
    .filter-select:focus { outline: none; border-color: var(--primary); }

    .menu-table { width: 100%; border-collapse: collapse; }
    .menu-table th {
      text-align: left; padding: 12px 16px; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; color: var(--text-light);
      background: var(--bg); border-bottom: 2px solid #eee;
    }
    .menu-table td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    .menu-table tr:last-child td { border-bottom: none; }
    .menu-table tr:hover td { background: #fafafa; }
    .table-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
    .table-name { font-weight: 600; font-size: 0.9rem; color: var(--dark); }
    .table-desc { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .cat-badge.minuman { background: #e3f2fd; color: #1565c0; }
    .cat-badge.makanan { background: #fff3e0; color: #e65100; }
    .price-text { font-weight: 700; color: var(--primary); font-size: 0.9rem; }
    .badge-pill {
      display: inline-block; padding: 3px 8px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; background: var(--primary); color: white;
    }
    .action-btns { display: flex; gap: 6px; }
    .btn-edit, .btn-delete {
      width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
      transition: var(--transition);
    }
    .btn-edit { background: #e3f2fd; color: #1565c0; }
    .btn-edit:hover { background: #1565c0; color: white; }
    .btn-delete { background: #fdecea; color: #c62828; }
    .btn-delete:hover { background: #c62828; color: white; }

    /* ADD BUTTON */
    .btn-add {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-family: 'Poppins', sans-serif; font-size: 0.88rem; font-weight: 600;
      transition: var(--transition);
    }
    .btn-add:hover { background: var(--primary-dark); }

    /* MODAL FORM */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 500; opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-box {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%);
      width: 90%; max-width: 560px; background: white; border-radius: var(--radius);
      z-index: 501; opacity: 0; pointer-events: none;
      transition: var(--transition); box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-box.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%); }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .modal-header h3 { font-size: 1.1rem; color: var(--dark); }
    .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-light); transition: var(--transition); }
    .modal-close:hover { color: var(--primary); }
    .modal-body { padding: 24px; }

    /* USERS TABLE */
    .user-role-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .user-role-badge.admin { background: #fce4ec; color: #c62828; }
    .user-role-badge.konsumen { background: #e8f5e9; color: #2e7d32; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .status-badge.aktif { background: #e8f5e9; color: #2e7d32; }
    .status-badge.diblokir { background: #fdecea; color: #c62828; }
    .btn-block { background: #fff3e0; color: #e65100; }
    .btn-block:hover { background: #e65100; color: white; }
    .btn-unblock { background: #e8f5e9; color: #2e7d32; }
    .btn-unblock:hover { background: #2e7d32; color: white; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-state i { font-size: 3rem; opacity: 0.3; display: block; margin-bottom: 12px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--dark); color: white; padding: 14px 28px; border-radius: 50px;
      font-size: 0.9rem; z-index: 9999; transition: var(--transition); opacity: 0;
      display: flex; align-items: center; gap: 10px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* CONFIRM DIALOG */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 600; opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .confirm-overlay.active { opacity: 1; pointer-events: all; }
    .confirm-box {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%);
      width: 90%; max-width: 360px; background: white; border-radius: var(--radius);
      z-index: 601; opacity: 0; pointer-events: none;
      transition: var(--transition); box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 32px 28px; text-align: center;
    }
    .confirm-box.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%); }
    .confirm-box i { font-size: 2.5rem; color: #e53935; margin-bottom: 16px; display: block; }
    .confirm-box h4 { font-size: 1.1rem; color: var(--dark); margin-bottom: 8px; }
    .confirm-box p { font-size: 0.88rem; color: var(--text-light); margin-bottom: 24px; }
    .confirm-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel-confirm {
      padding: 10px 24px; border: 2px solid #eee; border-radius: 50px;
      background: none; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600;
      transition: var(--transition);
    }
    .btn-cancel-confirm:hover { border-color: #aaa; }
    .btn-confirm-delete {
      padding: 10px 24px; background: #e53935; color: white; border: none; border-radius: 50px;
      cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; transition: var(--transition);
    }
    .btn-confirm-delete:hover { background: #c62828; }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar { position: static; height: auto; display: flex; flex-wrap: wrap; padding: 12px; gap: 4px; }
      .sidebar-label { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .admin-main { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="admin-topbar">
    <div class="admin-topbar-brand">
      <img src="assets/img/Logo2.png" alt="Logo">
      <span>Admin Panel</span>
    </div>
    <div class="admin-topbar-right">
      <div style="position:relative" id="adminUserWrap">
        <div class="admin-user-info" onclick="toggleAdminDropdown()" id="adminUserInfo" style="cursor:pointer;padding:6px 12px;border-radius:50px;transition:var(--transition)">
          <i class="fas fa-user-shield"></i>
          <span id="adminUserName">Admin</span>
          <i class="fas fa-chevron-down" style="font-size:0.7rem;opacity:0.7;margin-left:4px"></i>
        </div>
        <div class="user-dropdown" id="adminDropdown">
          <div class="dropdown-info">
            <span>Login sebagai</span>
            <strong id="adminDropdownName"></strong>
          </div>
          <button class="dropdown-item" onclick="openAcctModal(); closeAdminDropdown()">
            <i class="fas fa-user-cog"></i> Pengaturan Akun
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="admin-layout">
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Menu</div>
        <button class="sidebar-item active" onclick="showSection('dashboard', this)">
          <i class="fas fa-chart-pie"></i> Dashboard
        </button>
        <button class="sidebar-item" onclick="showSection('menu', this)">
          <i class="fas fa-utensils"></i> Kelola Menu
        </button>
        <button class="sidebar-item" onclick="showSection('users', this)">
          <i class="fas fa-users"></i> Data Pengguna
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- DASHBOARD -->
      <div class="panel-section active" id="section-dashboard">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon brown"><i class="fas fa-utensils"></i></div>
            <div class="stat-info"><span>Total Menu</span><strong id="statTotal">0</strong></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-mug-hot"></i></div>
            <div class="stat-info"><span>Minuman</span><strong id="statMinuman">0</strong></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange"><i class="fas fa-cookie-bite"></i></div>
            <div class="stat-info"><span>Makanan</span><strong id="statMakanan">0</strong></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-users"></i></div>
            <div class="stat-info"><span>Pengguna</span><strong id="statUsers">0</strong></div>
          </div>
        </div>

        <div class="content-card">
          <div class="content-card-header">
            <h3><i class="fas fa-list"></i> Menu Terbaru</h3>
          </div>
          <div class="content-card-body" style="padding:0">
            <table class="menu-table" id="dashRecentTable"></table>
          </div>
        </div>
      </div>

      <!-- KELOLA MENU -->
      <div class="panel-section" id="section-menu">
        <div class="content-card">
          <div class="content-card-header">
            <h3><i class="fas fa-utensils"></i> Daftar Menu (<span id="menuCountBadge">0</span>)</h3>
            <button class="btn-add" onclick="openMenuModal()">
              <i class="fas fa-plus"></i> Tambah Menu
            </button>
          </div>
          <div class="menu-toolbar">
            <div class="menu-cat-tabs">
              <button class="cat-tab active" id="tabAll">Semua</button>
              <button class="cat-tab" id="tabMinuman">☕ Minuman</button>
              <button class="cat-tab" id="tabMakanan">🍟 Makanan</button>
            </div>
            <div class="search-input-wrap">
              <i class="fas fa-search"></i>
              <input type="text" id="menuSearch" placeholder="Cari nama menu..." oninput="renderMenuTable()" />
            </div>
          </div>
          <div style="overflow-x:auto">
            <table class="menu-table" id="menuTable">
              <thead>
                <tr>
                  <th>Gambar</th>
                  <th>Nama Menu</th>
                  <th>Kategori</th>
                  <th>Harga</th>
                  <th>Badge</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="menuTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- DATA PENGGUNA -->
      <div class="panel-section" id="section-users">
        <div class="content-card">
          <div class="content-card-header">
            <h3><i class="fas fa-users"></i> Data Pengguna (<span id="userCountBadge">0</span>)</h3>
          </div>
          <div style="overflow-x:auto">
            <table class="menu-table" id="usersTable">
              <thead>
                <tr>
                  <th>Nama</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- MODAL TAMBAH/EDIT MENU -->
  <div class="modal-overlay" id="menuModalOverlay" onclick="closeMenuModal()"></div>
  <div class="modal-box" id="menuModal">
    <div class="modal-header">
      <h3 id="menuModalTitle">Tambah Menu Baru</h3>
      <button class="modal-close" onclick="closeMenuModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="form-grid">
        <div class="field">
          <label>Nama Menu</label>
          <input type="text" id="fName" placeholder="Nama makanan/minuman" />
        </div>
        <div class="field">
          <label>Kategori</label>
          <select id="fCat">
            <option value="minuman">☕ Minuman</option>
            <option value="makanan">🍟 Makanan Ringan</option>
          </select>
        </div>
        <div class="field">
          <label>Harga (Rp)</label>
          <input type="number" id="fPrice" placeholder="Contoh: 15000" min="0" />
        </div>
        <div class="field">
          <label>Badge (opsional)</label>
          <input type="text" id="fBadge" placeholder="Contoh: Baru, Terlaris" />
        </div>
        <div class="field full">
          <label>Deskripsi</label>
          <input type="text" id="fDesc" placeholder="Deskripsi singkat menu" />
        </div>
        <div class="field full">
          <label>URL Gambar (opsional)</label>
          <input type="text" id="fImg" placeholder="https://..." />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-add" onclick="saveMenu()"><i class="fas fa-save"></i> Simpan</button>
        <button class="btn-cancel-confirm" onclick="closeMenuModal()">Batal</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="confirm-overlay" id="confirmOverlay"></div>
  <div class="confirm-box" id="confirmBox">
    <i class="fas fa-trash-alt"></i>
    <h4>Hapus Menu?</h4>
    <p id="confirmMsg">Menu ini akan dihapus permanen.</p>
    <div class="confirm-btns">
      <button class="btn-cancel-confirm" onclick="closeConfirm()">Batal</button>
      <button class="btn-confirm-delete" onclick="doDelete()">Hapus</button>
    </div>
  </div>

  <!-- ACCOUNT MODAL -->
  <div class="acct-overlay" id="acctOverlay" onclick="closeAcctModal()"></div>
  <div class="acct-modal" id="acctModal">
    <div class="acct-header">
      <h3><i class="fas fa-user-cog"></i> Pengaturan Akun</h3>
      <button class="acct-close" onclick="closeAcctModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="acct-body">
      <div class="acct-avatar"><i class="fas fa-user-shield"></i></div>
      <div class="acct-name" id="acctName"></div>
      <div class="acct-role" id="acctRole"></div>
      <div class="acct-info-row"><i class="fas fa-user"></i> <span id="acctUsername"></span></div>
      <div class="acct-info-row"><i class="fas fa-shield-alt"></i> <span id="acctRoleInfo"></span></div>
    </div>
    <div class="acct-footer">
      <button class="btn-delete-acct" onclick="deleteAccount()">
        <i class="fas fa-trash-alt"></i> Hapus Akun Saya
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="assets/js/admin.js"></script>
  <script>
    document.getElementById('adminDropdownName').textContent = JSON.parse(localStorage.getItem('wn_session')||'{}').name || '';
    function toggleAdminDropdown() {
      document.getElementById('adminDropdown').classList.toggle('open');
    }
    function closeAdminDropdown() {
      document.getElementById('adminDropdown').classList.remove('open');
    }
    document.addEventListener('click', e => {
      const wrap = document.getElementById('adminUserWrap');
      if (wrap && !wrap.contains(e.target)) closeAdminDropdown();
    });
  </script>
</body>
</html>
